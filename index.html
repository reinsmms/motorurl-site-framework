<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>motorurl.com</title>

<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/header.css" />
<link rel="stylesheet" href="css/sidebar-title.css" />
<link rel="stylesheet" href="css/toc.css" />

</head>
<body>

<div id="header-include"></div>

<div class="app">

<aside class="sidebar" id="sidebar">
<div class="sidebarSectionTitle">3D PRINTING</div>
<nav id="treeNav" class="tree"></nav>
</aside>

<main class="main">

<div class="main__bar">

<button
id="hamburgerBtn"
type="button"
aria-controls="sidebar"
aria-expanded="false"

>

☰ </button>

<div class="crumbs" id="crumbs">
Home / Home
</div>

<button
id="tocToggle"
type="button"
aria-controls="tocPanel"
aria-expanded="true"

>

TOC </button>

</div>

<div class="main__contentRow">

<iframe
id="contentFrame"
name="contentFrame"
class="contentFrame"
title="Content frame"
src="pages/home.html"
loading="lazy"
></iframe>

<aside class="tocPanel" id="tocPanel">
<div class="tocPanel__title">On this page</div>
<nav id="tocList"></nav>
</aside>

</div>

</main>
</div>

<script>

fetch('includes/header.html')
.then(r => r.text())
.then(h => {
const host = document.getElementById('header-include');
if(host) host.innerHTML = h;
})
.catch(()=>{});

window.addEventListener('DOMContentLoaded', () => {
const frame = document.getElementById('contentFrame');

if(frame && !frame.getAttribute('src')){
frame.setAttribute('src','pages/home.html');
}
});

</script>

<script src="scripts/nav-data.js"></script>

<script src="scripts/nav.js"></script>

<script src="scripts/ui.js"></script>

<script src="scripts/toc.js"></script>

</body>
</html>
